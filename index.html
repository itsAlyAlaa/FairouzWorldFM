#maintenanceOverlay{
  position:fixed; inset:0; z-index:2147483647;
  display:flex; align-items:center; justify-content:center;

@keyframes mDrift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(28px,-24px) scale(1.1);}}
#maintenanceOverlay .m-stars{position:absolute; inset:0; background-image:radial-gradient(1.5px 1.5px at 15% 25%,#f3e8f6 60%,transparent),radial-gradient(1.5px 1.5px at 75% 60%,#f3e8f6 60%,transparent),radial-gradient(1px 1px at 40% 85%,#c9a36a 60%,transparent),radial-gradient(1px 1px at 88% 15%,#f3e8f6 60%,transparent),radial-gradient(1.5px 1.5px at 55% 40%,#c9a36a 60%,transparent),radial-gradient(1px 1px at 8% 65%,#f3e8f6 60%,transparent),radial-gradient(1px 1px at 30% 10%,#f3e8f6 60%,transparent),radial-gradient(1px 1px at 92% 80%,#c9a36a 60%,transparent); background-size:100% 100%; opacity:.6; animation:mTwinkle 3.2s ease-in-out infinite alternate;}
@keyframes mTwinkle{0%{opacity:.3;}100%{opacity:.8;}}
#maintenanceOverlay .m-notes{position:absolute; inset:0; pointer-events:none; overflow:hidden;}
#maintenanceOverlay .m-notes span{position:absolute; bottom:-40px; font-size:18px; color:#d9b888; opacity:0; animation:mFloat 9s linear infinite;}
#maintenanceOverlay .m-notes span:nth-child(1){left:8%; animation-delay:0s; font-size:16px;}
#maintenanceOverlay .m-notes span:nth-child(2){left:22%; animation-delay:1.6s; color:#c9879c; font-size:22px;}
#maintenanceOverlay .m-notes span:nth-child(3){left:38%; animation-delay:3.2s; font-size:14px;}
#maintenanceOverlay .m-notes span:nth-child(4){left:58%; animation-delay:.8s; color:#8b5cf6; font-size:20px;}
#maintenanceOverlay .m-notes span:nth-child(5){left:74%; animation-delay:4.4s; font-size:16px;}
#maintenanceOverlay .m-notes span:nth-child(6){left:88%; animation-delay:2.4s; color:#c9879c; font-size:18px;}
@keyframes mFloat{0%{transform:translateY(0) rotate(0deg); opacity:0;}10%{opacity:.55;}90%{opacity:.4;}100%{transform:translateY(-110vh) rotate(50deg); opacity:0;}}
#maintenanceOverlay .m-card{position:relative; z-index:2; text-align:center; padding:2.6rem 1.25rem; max-width:600px; width:100%;}
#maintenanceOverlay .m-logo-wrap{position:relative; width:150px; height:150px; margin:0 auto 1.8rem;}
#maintenanceOverlay .m-logo-halo{position:absolute; inset:-6px; border-radius:50%; background:conic-gradient(from 0deg,#d9b888,#8b5cf6,#c9879c,#d9b888); filter:blur(18px); opacity:.55; animation:mHalo 5s linear infinite;}
@keyframes mHalo{to{transform:rotate(360deg);}}
#maintenanceOverlay .m-ring{position:absolute; inset:0; border-radius:50%; border:1.5px solid transparent; border-top-color:#d9b888; border-left-color:#8b5cf6; animation:mSpin 3s linear infinite;}
#maintenanceOverlay .m-ring.r2{inset:-12px; border-top-color:transparent; border-right-color:#c9879c; border-bottom-color:#d9b888; animation:mSpin 4.5s linear infinite reverse;}
#maintenanceOverlay .m-ring.r3{inset:10px; border:1px dashed rgba(217,184,136,.35); animation:mSpin 8s linear infinite;}
@keyframes mSpin{to{transform:rotate(360deg);}}
#maintenanceOverlay .m-logo-disc{position:absolute; inset:14px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#2a1533,#140a1a 75%); box-shadow:0 0 0 1px rgba(217,184,136,.25), inset 0 0 30px rgba(139,92,246,.25); display:flex; align-items:center; justify-content:center; overflow:hidden; animation:mPulse 2.6s ease-in-out infinite;}
@keyframes mPulse{0%,100%{box-shadow:0 0 0 1px rgba(217,184,136,.25), inset 0 0 30px rgba(139,92,246,.25), 0 0 24px rgba(139,92,246,.12);}50%{box-shadow:0 0 0 1px rgba(217,184,136,.32), inset 0 0 32px rgba(139,92,246,.3), 0 0 30px rgba(217,184,136,.22);}}
#maintenanceOverlay .m-logo-img{width:72%; height:72%; object-fit:contain; animation:mLogoFloat 4.6s ease-in-out infinite;}
@keyframes mLogoFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-4px) scale(1.02);}}

#maintenanceOverlay p.m-desc{font-family:'Cairo',sans-serif; color:#a080b0; font-size:15px; line-height:1.95; margin:0 auto .35rem; max-width:460px;}

/* ── Countdown: fluid flex row, never wraps, scales smoothly on any screen ── */
#maintenanceOverlay .m-countdown{
  display:flex; align-items:stretch; justify-content:center; flex-wrap:nowrap;
  gap:clamp(4px,1.6vw,10px); margin:0 auto 1.9rem; width:100%; max-width:420px;
}
#maintenanceOverlay .m-unit{
  position:relative; flex:1 1 0; min-width:0;
  background:linear-gradient(160deg,rgba(139,92,246,.14),rgba(217,184,136,.05));
  border:1px solid rgba(217,184,136,.28); border-radius:14px;
  padding:clamp(.6rem,2.4vw,1rem) clamp(.3rem,1.5vw,1.15rem);
  backdrop-filter:blur(8px); overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#maintenanceOverlay .m-unit .m-digit-stage{perspective:220px; height:clamp(22px,7vw,34px); display:flex; align-items:center; justify-content:center; width:100%;}
#maintenanceOverlay .m-unit b{
  position:relative; display:block; font-family:'Cairo',sans-serif;
  font-size:clamp(16px,5.6vw,28px); font-weight:800; line-height:1;
  background:linear-gradient(180deg,#f3e8f6,#d9b888); -webkit-background-clip:text; background-clip:text; color:transparent;
  font-variant-numeric:tabular-nums; white-space:nowrap;
}
#maintenanceOverlay .m-unit b.tick{animation:mDissolve 1.1s ease;}
@keyframes mDissolve{0%{opacity:.1;}100%{opacity:1;}}
#maintenanceOverlay .m-unit span{position:relative; display:block; font-family:'Cairo',sans-serif; font-size:clamp(8.5px,2.6vw,11px); color:#a080b0; margin-top:5px; letter-spacing:.3px; white-space:nowrap;}
#maintenanceOverlay .m-colon{
  flex:0 0 auto; align-self:center;
  font-family:'Cairo',sans-serif; font-size:clamp(13px,4vw,22px); font-weight:800; color:#8b5cf6;
  opacity:.7; animation:mBlink 1.4s steps(1) infinite;
}
@keyframes mBlink{50%{opacity:.15;}}

#maintenanceOverlay .m-bar-wrap{width:100%; max-width:420px; height:6px; margin:0 auto; border-radius:99px; background:rgba(255,255,255,.06); overflow:hidden; position:relative;}
#maintenanceOverlay .m-bar{height:100%; border-radius:99px; background:linear-gradient(90deg,#8b5cf6,#c9879c,#d9b888); width:0%; transition:width 1s linear; position:relative;}
#maintenanceOverlay .m-bar::after{content:'';position:absolute; inset:0; background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent); animation:mShine 2s ease-in-out infinite;}
@keyframes mShine{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
#maintenanceOverlay .m-note{margin-top:1.7rem; font-family:'Inter',sans-serif; font-size:11.5px; color:#5c4a6c; letter-spacing:.5px;}

@media (prefers-reduced-motion: reduce){

}

<body>

<div id="maintenanceOverlay" role="alert" aria-live="polite">
  <div class="m-aurora a1"></div>
  <div class="m-aurora a2"></div>
  <div class="m-aurora a3"></div>
  <div class="m-stars"></div>
  <div class="m-notes" aria-hidden="true">
    <span>&#9834;</span><span>&#9835;</span><span>&#9833;</span><span>&#9834;</span><span>&#9835;</span><span>&#9833;</span>
  </div>
  <div class="m-card">
    <div class="m-logo-wrap">
      <div class="m-logo-halo"></div>
      <div class="m-ring r3"></div>
      <div class="m-ring r2"></div>
      <div class="m-ring"></div>
      <div class="m-logo-disc">
        <img src="assets/img-8564.webp" class="m-logo-img" alt="Fairouz World FM">
      </div>
    </div>
    <p class="m-sub">Under Maintenance</p>
    <h1>الموقع تحت الصيانة حاليًا</h1>
    <p class="m-desc">بنشتغل على تحديثات وتحسينات جديدة لعالم فيروز، هنرجع قريب أحلى من الأول. البث هيرجع تلقائيًا بعد انتهاء الصيانة.</p>
    <p class="m-signature">مع تحيات فريق العمل 🤍</p>
    <div class="m-countdown" id="mCountdown">
      <div class="m-unit"><div class="m-digit-stage"><b id="mSecs">00</b></div><span>ثانية</span></div>
      <div class="m-colon">:</div>
      <div class="m-unit"><div class="m-digit-stage"><b id="mMins">00</b></div><span>دقيقة</span></div>
      <div class="m-colon">:</div>
      <div class="m-unit"><div class="m-digit-stage"><b id="mHours">00</b></div><span>ساعة</span></div>
      <div class="m-colon">:</div>
      <div class="m-unit"><div class="m-digit-stage"><b id="mDays">00</b></div><span>يوم</span></div>
    </div>
    <div class="m-bar-wrap"><div class="m-bar" id="mBar"></div></div>
    <p class="m-note">Fairouz World FM · Back soon</p>
  </div>
  <audio id="maintenanceMusic" loop preload="none"></audio>
</div>

<script>
(function(){
  // تشغيل موسيقى الصيانة تلقائيًا وبشكل مستمر (لووب) طول ما الصفحة مفتوحة
  var mMusic = document.getElementById('maintenanceMusic');
  if(mMusic){
    mMusic.loop = true;
    mMusic.volume = 0.7;
    var tryPlay = function(){
      mMusic.play().catch(function(){
        setTimeout(tryPlay, 400);
      });
    };
    fetch('musicUM.mp3').then(function(r){ return r.blob(); }).then(function(blob){
      mMusic.src = URL.createObjectURL(blob);
      tryPlay();
    }).catch(function(){
      // fallback في حالة فشل الـ fetch لأي سبب (مثلاً CORS محلي)
      mMusic.src = 'musicUM.mp3';
      tryPlay();
    });
    // احتياط: لو حصل توقف لأي سبب (تحميل، اتصال...) نرجعها تشتغل تاني تلقائيًا
    mMusic.addEventListener('pause', function(){
      if(document.visibilityState === 'visible'){
        setTimeout(function(){ mMusic.play().catch(function(){}); }, 300);
      }
    });
    mMusic.addEventListener('ended', function(){
      mMusic.currentTime = 0;
      mMusic.play().catch(function(){});
    });
  }

  // العد التنازلي حتى 20 يوليو 2026 الساعة 7 مساءً (بتوقيت مصر)
  var target = new Date('2026-08-01T19:00:00+02:00').getTime();
  var start = Date.now();
  var lastVals = {};
  function setDigit(id, val){
    var el = document.getElementById(id);
    if(lastVals[id] !== val){
      lastVals[id] = val;
      el.classList.remove('tick');
      void el.offsetWidth;
      el.textContent = val;
      el.classList.add('tick');
    }
  }
  function tick(){
    var now = Date.now();
    var diff = target - now;
    if(diff <= 0){
      setDigit('mDays','00'); setDigit('mHours','00'); setDigit('mMins','00'); setDigit('mSecs','00');
      document.getElementById('mBar').style.width='100%';
      return;
    }
    var d = Math.floor(diff/(1000*60*60*24));
    var h = Math.floor((diff/(1000*60*60))%24);
    var m = Math.floor((diff/(1000*60))%60);
    var s = Math.floor((diff/1000)%60);
    setDigit('mDays', String(d).padStart(2,'0'));
    setDigit('mHours', String(h).padStart(2,'0'));
    setDigit('mMins', String(m).padStart(2,'0'));
    setDigit('mSecs', String(s).padStart(2,'0'));
    var total = target - start;
    var elapsed = now - start;
    var pct = total>0 ? Math.min(100,(elapsed/total)*100) : 100;
    document.getElementById('mBar').style.width = pct+'%';
  }
  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
