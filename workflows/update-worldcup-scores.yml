name: Update World Cup Scores

on:
  schedule:
    # كل 15 دقيقة، على مدار الساعة، كل يوم
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # ده بيديك زرار تشغّل بيه السكريبت يدويًا للتجربة

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run score updater
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-worldcup-scores.js

      - name: Commit changes (if any)
        run: |
          git config user.name "worldcup-score-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "تحديث تلقائي: نتيجة مباراة جديدة"
          git push
